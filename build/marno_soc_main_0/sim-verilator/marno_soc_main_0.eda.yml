  name: ../src/lowrisc_ip_uart_0.1/rtl/uart_tx.sv
- core: lowrisc:ip:uart:0.1
  file_type: systemVerilogSource
  name: ../src/lowrisc_ip_uart_0.1/rtl/uart_core.sv
- core: lowrisc:ip:uart:0.1
  file_type: systemVerilogSource
  name: ../src/lowrisc_ip_uart_0.1/rtl/uart.sv
- core: lowrisc:ip:xbar_main:0.1
  file_type: systemVerilogSource
  name: ../src/lowrisc_ip_xbar_main_0.1/tl_main_pkg.sv
- core: lowrisc:ip:xbar_main:0.1
  file_type: systemVerilogSource
  name: ../src/lowrisc_ip_xbar_main_0.1/xbar_main.sv
- core: marno:soc:main:0
  file_type: systemVerilogSource
  name: ../src/marno_soc_main_0/rtl/soc_mod.sv
- core: marno:soc:main:0
  file_type: systemVerilogSource
  name: ../src/marno_soc_main_0/dv/top_verilator.sv
- core: marno:soc:main:0
  file_type: cppSource
  name: ../src/marno_soc_main_0/dv/top_verilator.cc
hooks:
  pre_build:
  - cmd:
    - python3
    - util/check_tool_requirements.py
    env:
      FILES_ROOT: ../src/lowrisc_tool_check_tool_requirements_0.1
    name: check_tool_requirements
name: marno_soc_main_0
parameters:
  PRIM_DEFAULT_IMPL:
    datatype: str
    default: prim_pkg::ImplGeneric
    description: Primitives implementation to use, e.g. "prim_pkg::ImplGeneric".
    paramtype: vlogdefine
  RVFI:
    datatype: bool
    default: true
    paramtype: vlogdefine
tool_options:
  verilator:
    mode: cc
    verilator_options:
    - -DDISABLE_PRIM_CDC_RAND_DELAY
    - --trace
    - --trace-fst
    - --trace-structs
    - --trace-params
    - --trace-max-array 1024
    - -CFLAGS "-Wall -DVM_TRACE_FMT_FST -DTOPLEVEL_NAME=top_verilator"
    - -LDFLAGS "-pthread -lutil -lelf"
    - -Wno-WIDTHEXPAND
    - -Wno-WIDTHTRUNC
    - -Wno-UNOPTFLAT
    - --unroll-count 72
toplevel: top_verilator
version: 0.2.1
vpi: []
